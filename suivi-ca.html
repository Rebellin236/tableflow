<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TableFlow — Suivi CA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --or:#B8924A; --or-clair:#D4B575; --anthracite:#1C1C1C; --gris:#6B6B6B;
  --gris-clair:#E8E6E1; --creme:#FAF8F4; --blanc:#fff;
  --vert:#2D7A4B; --rouge:#C4453A; --bleu:#2C5F8A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
     background:var(--creme);color:var(--anthracite);padding-bottom:60px}

/* ---------- En-tete ---------- */
header{background:var(--anthracite);color:#fff;padding:14px 22px;
       display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:50}
header .marque{font-size:17px;font-weight:600;letter-spacing:.5px}
header .marque span{color:var(--or)}
header .sep{width:1px;height:22px;background:#444}
header .titre{font-size:15px;color:#ccc}
header .droite{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13px}
.badge{padding:3px 10px;border-radius:3px;font-size:11px;letter-spacing:.5px;
       text-transform:uppercase;font-weight:600}
.badge.lecture{background:#3A3A3A;color:#bbb}
.badge.edition{background:var(--or);color:#1C1C1C}

/* ---------- Barre de navigation ---------- */
.nav{background:var(--blanc);border-bottom:1px solid var(--gris-clair);
     padding:12px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
     position:sticky;top:50px;z-index:40}
.mois-liste{display:flex;gap:2px;flex-wrap:wrap}
.mois-btn{padding:6px 12px;border:1px solid var(--gris-clair);background:var(--blanc);
          border-radius:3px;cursor:pointer;font-size:12.5px;color:var(--gris);
          transition:all .12s}
.mois-btn:hover{border-color:var(--or-clair);color:var(--anthracite)}
.mois-btn.actif{background:var(--anthracite);border-color:var(--anthracite);color:#fff;font-weight:600}
.mois-btn.vide{opacity:.4}
.nav .annee{font-weight:600;font-size:15px;padding:0 8px}
.fleche{padding:6px 11px;border:1px solid var(--gris-clair);background:var(--blanc);
        border-radius:3px;cursor:pointer;font-size:14px;line-height:1}
.fleche:hover{border-color:var(--or)}
.nav .droite{margin-left:auto;display:flex;gap:8px}

button.action{padding:7px 15px;border:none;border-radius:3px;cursor:pointer;
              font-size:13px;font-weight:500;transition:opacity .12s}
button.action:hover{opacity:.85}
button.action:disabled{opacity:.4;cursor:not-allowed}
.btn-or{background:var(--or);color:#1C1C1C}
.btn-sombre{background:var(--anthracite);color:#fff}
.btn-vide{background:var(--blanc);color:var(--anthracite);border:1px solid var(--gris-clair)}

/* ---------- Onglets de vue ---------- */
.vues{display:flex;gap:0;padding:0 22px;background:var(--blanc);
      border-bottom:1px solid var(--gris-clair)}
.vue-btn{padding:11px 20px;border:none;background:none;cursor:pointer;
         font-size:13.5px;color:var(--gris);border-bottom:2px solid transparent}
.vue-btn:hover{color:var(--anthracite)}
.vue-btn.actif{color:var(--anthracite);font-weight:600;border-bottom-color:var(--or)}

main{padding:20px 22px}

/* ---------- Tableau ---------- */
.cadre{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:4px;
       overflow:auto;max-height:calc(100vh - 230px)}
table{border-collapse:separate;border-spacing:0;font-size:12px;white-space:nowrap}
th,td{padding:5px 7px;border-right:1px solid #F0EEE9;border-bottom:1px solid #F0EEE9;
      text-align:right}
th{background:var(--creme);font-weight:600;position:sticky;top:0;z-index:10;
   font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--gris)}
thead tr:first-child th{top:0;background:var(--anthracite);color:#fff;
   font-size:11.5px;letter-spacing:.5px;border-right:1px solid #333}
thead tr:nth-child(2) th{top:26px;background:#3A3A3A;color:var(--or-clair);border-right:1px solid #4A4A4A}
thead tr:nth-child(3) th{top:52px}
td.jour,th.jour{position:sticky;left:0;background:var(--creme);text-align:left;
                z-index:5;border-right:1px solid var(--gris-clair);font-weight:500;min-width:76px}
thead th.jour{z-index:15;background:var(--anthracite);color:#fff}
thead tr:nth-child(2) th.jour{background:#3A3A3A}
thead tr:nth-child(3) th.jour{background:var(--creme);color:var(--gris)}
tr.we td{background:#FCFAF6}
tr.we td.jour{background:#F5F1E9}
tr:hover td{background:#FFFCF5}
tr.total td{background:var(--anthracite)!important;color:#fff;font-weight:600;
            border-top:2px solid var(--or);font-size:12.5px}
tr.total td.jour{background:var(--anthracite)!important;color:var(--or)}
tr.pourcent td{background:#F5F1E9!important;color:var(--gris);font-size:11.5px;font-style:italic}
tr.pourcent td.jour{background:#F5F1E9!important}
td.pm{color:var(--gris);font-size:11.5px}
td.vide{color:#D5D2CC}
.groupe-fin{border-right:2px solid var(--gris-clair)!important}

/* ---------- Comparatif ---------- */
.ecart-pos{color:var(--vert);font-weight:600}
.ecart-neg{color:var(--rouge);font-weight:600}
tr.ecart td{background:#F0F4F8!important;font-weight:500}
tr.ecart td.jour{background:#E4EBF2!important}
tr.n1 td{background:#FAFAF8!important;color:var(--gris)}
tr.n1 td.jour{background:#F2F0EC!important}

/* ---------- Cartes synthese ---------- */
.cartes{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
        gap:12px;margin-bottom:18px}
.carte{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:4px;
       padding:14px 16px;border-left:3px solid var(--or)}
.carte .lib{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--gris);
            margin-bottom:6px}
.carte .val{font-size:22px;font-weight:600;letter-spacing:-.5px}
.carte .sub{font-size:12px;color:var(--gris);margin-top:4px}
.carte .sub b.pos{color:var(--vert)} .carte .sub b.neg{color:var(--rouge)}

/* ---------- Import ---------- */
.zone{border:2px dashed var(--gris-clair);border-radius:5px;padding:34px;
      text-align:center;background:var(--blanc);cursor:pointer;transition:all .15s}
.zone:hover,.zone.survol{border-color:var(--or);background:#FFFDF8}
.zone .icone{font-size:30px;color:var(--or);margin-bottom:8px}
.zone .t{font-size:15px;font-weight:600;margin-bottom:5px}
.zone .s{font-size:12.5px;color:var(--gris)}

.relecture{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:4px;
           margin-top:18px;overflow:hidden}
.relecture .tete{background:var(--anthracite);color:#fff;padding:12px 18px;
                 display:flex;align-items:center;gap:12px}
.relecture .tete .d{font-size:15px;font-weight:600}
.relecture .tete .m{margin-left:auto;font-size:12.5px;color:var(--or-clair)}
.relecture table{width:100%;white-space:normal}
.relecture th{text-align:left;padding:8px 14px}
.relecture th.n{text-align:right}
.relecture td{padding:7px 14px}
.relecture td.lib{text-align:left;font-weight:500}
.relecture .pied{padding:14px 18px;display:flex;gap:10px;justify-content:flex-end;
                 border-top:1px solid var(--gris-clair);background:var(--creme)}
.chg{color:var(--bleu);font-size:11px;margin-left:6px}

.alerte{padding:11px 16px;border-radius:4px;margin-bottom:14px;font-size:13px;
        display:flex;gap:10px;align-items:flex-start}
.alerte b{display:block;margin-bottom:2px}
.a-info{background:#EAF1F7;border-left:3px solid var(--bleu);color:#1A3D5C}
.a-attention{background:#FDF3E3;border-left:3px solid var(--or);color:#6B4E13}
.a-erreur{background:#FBEAE8;border-left:3px solid var(--rouge);color:#7A241D}
.a-ok{background:#E9F4EC;border-left:3px solid var(--vert);color:#1D5232}

.vide-msg{text-align:center;padding:50px 20px;color:var(--gris)}
.vide-msg .g{font-size:34px;color:var(--gris-clair);margin-bottom:10px}

#toast{position:fixed;bottom:22px;right:22px;background:var(--anthracite);color:#fff;
       padding:13px 20px;border-radius:4px;font-size:13.5px;opacity:0;
       transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:200;
       border-left:3px solid var(--or);max-width:340px}
#toast.on{opacity:1;transform:translateY(0)}
#toast.err{border-left-color:var(--rouge)}

.masque{display:none!important}
</style>
</head>
<body>

<header>
  <div class="marque">Table<span>Flow</span></div>
  <div class="sep"></div>
  <div class="titre">Suivi du chiffre d'affaires</div>
  <div class="droite">
    <span id="qui"></span>
    <span class="badge lecture" id="mode">Lecture</span>
  </div>
</header>

<div class="vues">
  <button class="vue-btn actif" data-vue="mois">Vue mensuelle</button>
  <button class="vue-btn" data-vue="comparatif">Comparatif N / N-1</button>
  <button class="vue-btn" data-vue="annee">Cumul annuel</button>
  <button class="vue-btn" data-vue="import">Import Bizzon</button>
</div>

<div class="nav" id="nav">
  <button class="fleche" id="prec">&#8249;</button>
  <span class="annee" id="annee">2026</span>
  <button class="fleche" id="suiv">&#8250;</button>
  <div class="mois-liste" id="mois"></div>
  <div class="droite">
    <button class="action btn-vide" id="btn-excel">Exporter en Excel</button>
  </div>
</div>

<main id="corps"></main>
<div id="toast"></div>

<script>
/* =====================================================================
   CONFIGURATION
   ===================================================================== */
const SUPABASE_URL = "https://auxnjixcppmsqmqkmjsj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1eG5qaXhjcHBtc3FtcWttanNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NDkzNDIsImV4cCI6MjEwMDEyNTM0Mn0.sHT_4cpxIBaqaGTnLDevCjWcnLe8gn0dG1sTo6dbjXE";

const POSTES = [
  {c:"petit_dejeuner",  n:"Petit déjeuner",  g:"Petit déjeuner", cv:true },
  {c:"bar_midi",        n:"Bar Midi",        g:"BAR 1.13",       cv:false},
  {c:"bar_soir",        n:"Bar Soir",        g:"BAR 1.13",       cv:false},
  {c:"rest_bar_midi",   n:"Rest Bar Midi",   g:"BAR 1.13",       cv:true },
  {c:"rest_bar_soir",   n:"Rest Bar Soir",   g:"BAR 1.13",       cv:true },
  {c:"room_service",    n:"Room Service",    g:"BAR 1.13",       cv:true },
  {c:"m_shop",          n:"M Shop",          g:"M shop",         cv:false},
  {c:"wtc",             n:"WTC",             g:"BANQUETING",     cv:true },
  {c:"journee_etude",   n:"Journée étude",   g:"BANQUETING",     cv:true },
  {c:"sem_res_midi",    n:"Sém. rés. midi",  g:"BANQUETING",     cv:true },
  {c:"sem_res_soir",    n:"Sém. rés. soir",  g:"BANQUETING",     cv:true },
  {c:"sur_mesure_midi", n:"Sur mesure midi", g:"BANQUETING",     cv:true },
  {c:"sur_mesure_soir", n:"Sur mesure soir", g:"BANQUETING",     cv:true },
  {c:"cocktail",        n:"Cocktail",        g:"BANQUETING",     cv:true },
  {c:"groupe_midi",     n:"Groupe midi",     g:"BANQUETING",     cv:true },
  {c:"groupe_soir",     n:"Groupe soir",     g:"BANQUETING",     cv:true },
  {c:"loc_salle",       n:"Loc. salle",      g:"LOCATION",       cv:false},
  {c:"loc_materiel",    n:"Loc. matériel",   g:"LOCATION",       cv:false}
];

/* Correspondance libelle Bizzon -> code interne */
const BIZZON = {
  "PETIT DEJEUNER OURSINADE":"petit_dejeuner",
  "BAR MIDI":"bar_midi",
  "BAR SOIR":"bar_soir",
  "RESTAU BAR MIDI":"rest_bar_midi",
  "RESTAU BAR SOIR":"rest_bar_soir",
  "ROOM SERVICE":"room_service",
  "M SHOP":"m_shop",
  "NOURRITURE WTC":"wtc",
  "JOURNEE ETUDE":"journee_etude",
  "SEMINAIRE RESIDENTIEL MIDI":"sem_res_midi",
  "SEMINAIRE RESIDENTIEL SOIR":"sem_res_soir",
  "SUR MESURE MIDI":"sur_mesure_midi",
  "SUR MESURE SOIR":"sur_mesure_soir",
  "COCKTAIL":"cocktail",
  "GROUPE MIDI":"groupe_midi",
  "GROUPE SOIR":"groupe_soir",
  "LOCATION DE SALLE":"loc_salle",
  "LOCATION DE MATERIEL":"loc_materiel"
};
/* Postes Bizzon volontairement non repris (surveilles) */
const IGNORES = ["LOCATION DE SALLE WTC","PAS DE CENTRE DE REVENUS"];

const GROUPES = ["Petit déjeuner","BAR 1.13","M shop","BANQUETING","LOCATION"];
const MOIS_N = ["Janvier","Février","Mars","Avril","Mai","Juin",
                "Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const JOURS_N = ["Dim.","Lun.","Mar.","Mer.","Jeu.","Ven.","Sam."];

/* =====================================================================
   ETAT
   ===================================================================== */
let sb = null;
let etat = { annee:2026, mois:new Date().getMonth()+1, vue:"mois",
             donnees:{}, edition:false, utilisateur:null, enAttente:null };

/* =====================================================================
   OUTILS
   ===================================================================== */
const eur = n => (n===null||n===undefined||isNaN(n)) ? "—"
  : n.toLocaleString("fr-FR",{minimumFractionDigits:0,maximumFractionDigits:0})+" €";
const eur2 = n => (n===null||n===undefined||isNaN(n)) ? "—"
  : n.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
const ent = n => (n===null||n===undefined||isNaN(n)) ? "—"
  : n.toLocaleString("fr-FR");
const pct = n => (n===null||n===undefined||!isFinite(n)) ? "—"
  : (n*100).toFixed(1).replace(".",",")+" %";
const iso = (a,m,j) => `${a}-${String(m).padStart(2,"0")}-${String(j).padStart(2,"0")}`;
const nbJours = (a,m) => new Date(a,m,0).getDate();

function toast(msg, err){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="on"+(err?" err":"");
  clearTimeout(t._h); t._h=setTimeout(()=>t.className="",3600);
}

/* Prix moyen : null si pas de couverts (ne jamais afficher 0) */
function pm(ca,cv){
  if(!cv || cv===0) return null;
  if(ca===null||ca===undefined) return null;
  return ca/cv;
}

/* =====================================================================
   CONNEXION
   ===================================================================== */
function panneau(type,titre,txt){
  document.getElementById("corps").innerHTML =
    `<div class="alerte a-${type}"><div><b>${titre}</b>${txt}</div></div>`;
}

async function init(){
  try{
    if(SUPABASE_URL.indexOf("__")===0){
      panneau("erreur","Module non configuré",
        "Les identifiants Supabase n'ont pas été renseignés dans ce fichier.");
      return;
    }
    if(typeof supabase==="undefined"){
      panneau("erreur","Librairie non chargée",
        "Le script Supabase n'a pas pu être téléchargé. Vérifiez votre connexion "
        +"puis rechargez la page.");
      return;
    }

    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* --- Session --- */
    let session=null;
    try{
      const r = await sb.auth.getSession();
      session = r.data ? r.data.session : null;
    }catch(e){}

    if(!session){
      panneau("attention","Session expirée",
        "Reconnectez-vous depuis l'accueil TableFlow, puis revenez sur ce module. "
        +'<br><br><a href="index.html" style="color:inherit;font-weight:600">'
        +"&rsaquo; Retour à l'accueil</a>");
      return;
    }
    etat.utilisateur = session.user.email;
    document.getElementById("qui").textContent = etat.utilisateur;

    /* --- Droits : tolerant a l'absence de table profils --- */
    etat.edition = true;                 /* par defaut : editeur */
    try{
      const {data:p,error:ep} = await sb.from("profils").select("role")
                                  .eq("id",session.user.id).maybeSingle();
      if(!ep && p && p.role) etat.edition = ["admin","editeur"].includes(p.role);
    }catch(e){ /* pas de table profils : on reste editeur */ }

    const b=document.getElementById("mode");
    b.textContent = etat.edition?"Édition":"Lecture";
    b.className = "badge "+(etat.edition?"edition":"lecture");

    /* --- Donnees --- */
    const ok = await charger();
    if(!ok) return;

    /* --- Se placer sur le dernier mois renseigne --- */
    const cles=Object.keys(etat.donnees).sort();
    if(cles.length){
      const d=cles[cles.length-1];
      etat.annee=+d.slice(0,4); etat.mois=+d.slice(5,7);
    }

    construireNav();
    rendre();

  }catch(err){
    panneau("erreur","Le module n'a pas pu démarrer",
      (err && err.message ? err.message : String(err))
      + "<br><br>Signalez ce message pour correction.");
    console.error(err);
  }
}

async function charger(){
  const {data,error} = await sb.from("suivi_ca").select("jour,donnees");
  if(error){
    panneau("erreur","Données inaccessibles",
      error.message
      +"<br><br>Vérifiez que les deux requêtes SQL du module ont bien été "
      +"exécutées dans Supabase (schéma puis données).");
    return false;
  }
  etat.donnees = {};
  (data||[]).forEach(r => etat.donnees[r.jour] = r.donnees || {});
  if(!Object.keys(etat.donnees).length){
    toast("Aucune donnée en base — lancez la requête d'import.",true);
  }
  return true;
}

/* =====================================================================
   NAVIGATION
   ===================================================================== */
function construireNav(){
  const z=document.getElementById("mois"); z.innerHTML="";
  MOIS_N.forEach((m,i)=>{
    const b=document.createElement("button");
    b.className="mois-btn"+(i+1===etat.mois?" actif":"");
    b.textContent=m.slice(0,4);
    b.title=m;
    if(!moisRempli(etat.annee,i+1)) b.classList.add("vide");
    b.onclick=()=>{ etat.mois=i+1; construireNav(); rendre(); };
    z.appendChild(b);
  });
  document.getElementById("annee").textContent=etat.annee;
}
function moisRempli(a,m){
  for(let j=1;j<=nbJours(a,m);j++) if(etat.donnees[iso(a,m,j)]) return true;
  return false;
}
document.getElementById("prec").onclick=()=>{etat.annee--;construireNav();rendre();};
document.getElementById("suiv").onclick=()=>{etat.annee++;construireNav();rendre();};
document.querySelectorAll(".vue-btn").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".vue-btn").forEach(x=>x.classList.remove("actif"));
    b.classList.add("actif"); etat.vue=b.dataset.vue;
    document.getElementById("nav").classList.toggle("masque", etat.vue==="import");
    rendre();
  };
});

/* =====================================================================
   CALCULS
   ===================================================================== */
function jourVal(a,m,j,code,champ){
  const d = etat.donnees[iso(a,m,j)];
  if(!d || !d[code]) return null;
  const v = d[code][champ];
  return (v===undefined) ? null : v;
}
function totalMois(a,m,code,champ){
  let s=null;
  for(let j=1;j<=nbJours(a,m);j++){
    const v=jourVal(a,m,j,code,champ);
    if(v!==null){ s=(s||0)+v; }
  }
  return s;
}
function totalAnnee(a,code,champ){
  let s=null;
  for(let m=1;m<=12;m++){
    const v=totalMois(a,m,code,champ);
    if(v!==null) s=(s||0)+v;
  }
  return s;
}
function totalGroupeMois(a,m,groupe,champ){
  let s=null;
  POSTES.filter(p=>p.g===groupe && (champ==="ca"||p.cv)).forEach(p=>{
    const v=totalMois(a,m,p.c,champ);
    if(v!==null) s=(s||0)+v;
  });
  return s;
}
function caJour(a,m,j,avecLoc){
  let s=null;
  POSTES.forEach(p=>{
    if(!avecLoc && p.g==="LOCATION") return;
    const v=jourVal(a,m,j,p.c,"ca");
    if(v!==null) s=(s||0)+v;
  });
  return s;
}
function caMois(a,m,avecLoc){
  let s=null;
  for(let j=1;j<=nbJours(a,m);j++){
    const v=caJour(a,m,j,avecLoc);
    if(v!==null) s=(s||0)+v;
  }
  return s;
}
function caAnnee(a,avecLoc){
  let s=null;
  for(let m=1;m<=12;m++){ const v=caMois(a,m,avecLoc); if(v!==null) s=(s||0)+v; }
  return s;
}

/* =====================================================================
   RENDU
   ===================================================================== */
function rendre(){
  const c=document.getElementById("corps");
  if(etat.vue==="mois")            c.innerHTML=vueMois();
  else if(etat.vue==="comparatif") c.innerHTML=vueComparatif();
  else if(etat.vue==="annee")      c.innerHTML=vueAnnee();
  else                             { c.innerHTML=vueImport(); brancherImport(); }
}

/* ---------- En-tetes de tableau (3 niveaux, comme l'Excel) ---------- */
function entetes(){
  let l1='<tr><th class="jour" rowspan="3">Jour</th>';
  GROUPES.forEach(g=>{
    const ps=POSTES.filter(p=>p.g===g);
    let n=0; ps.forEach(p=> n += p.cv?3:1);
    l1+=`<th colspan="${n}">${g}</th>`;
  });
  l1+='<th colspan="2">C.A. TOTAL</th></tr>';

  let l2='<tr>';
  GROUPES.forEach(g=>{
    POSTES.filter(p=>p.g===g).forEach(p=>{
      l2+=`<th colspan="${p.cv?3:1}">${p.n}</th>`;
    });
  });
  l2+='<th>A/ LOSA</th><th>S/ LOSA</th></tr>';

  let l3='<tr>';
  POSTES.forEach(p=>{
    l3+='<th>CA</th>';
    if(p.cv) l3+='<th>Cvts</th><th>P.M</th>';
  });
  l3+='<th>Total</th><th>Hors loc.</th></tr>';
  return `<thead>${l1}${l2}${l3}</thead>`;
}

function cellulesJour(a,m,j){
  let h="";
  POSTES.forEach(p=>{
    const ca=jourVal(a,m,j,p.c,"ca");
    h+=`<td class="${ca===null?'vide':''}">${ca===null?'·':eur(ca)}</td>`;
    if(p.cv){
      const cv=jourVal(a,m,j,p.c,"cvts");
      const v=pm(ca,cv);
      h+=`<td class="${cv===null?'vide':''}">${cv===null?'·':ent(cv)}</td>`;
      h+=`<td class="pm ${v===null?'vide':''}">${v===null?'·':eur(v)}</td>`;
    }
  });
  const t=caJour(a,m,j,true), sl=caJour(a,m,j,false);
  h+=`<td>${t===null?'·':eur(t)}</td><td>${sl===null?'·':eur(sl)}</td>`;
  return h;
}

function vueMois(){
  const a=etat.annee, m=etat.mois;
  if(!moisRempli(a,m))
    return `<div class="vide-msg"><div class="g">◇</div>
      <div>Aucune donnée pour ${MOIS_N[m-1]} ${a}.</div>
      <div style="font-size:12.5px;margin-top:6px">
        Importez un export Bizzon pour commencer à remplir ce mois.</div></div>`;

  let lignes="";
  for(let j=1;j<=nbJours(a,m);j++){
    const d=new Date(a,m-1,j), we=(d.getDay()===0||d.getDay()===6);
    lignes+=`<tr class="${we?'we':''}">
      <td class="jour">${JOURS_N[d.getDay()]} ${String(j).padStart(2,"0")}</td>
      ${cellulesJour(a,m,j)}</tr>`;
  }

  /* Ligne des totaux */
  let tot='<tr class="total"><td class="jour">Totaux</td>';
  POSTES.forEach(p=>{
    const ca=totalMois(a,m,p.c,"ca");
    tot+=`<td>${ca===null?'·':eur(ca)}</td>`;
    if(p.cv){
      const cv=totalMois(a,m,p.c,"cvts"), v=pm(ca,cv);
      tot+=`<td>${cv===null?'·':ent(cv)}</td><td>${v===null?'·':eur(v)}</td>`;
    }
  });
  const tm=caMois(a,m,true), sm=caMois(a,m,false);
  tot+=`<td>${eur(tm)}</td><td>${eur(sm)}</td></tr>`;

  /* Ligne % du CA hors location */
  let pc='<tr class="pourcent"><td class="jour">% / CA ss LOSA</td>';
  POSTES.forEach(p=>{
    const ca=totalMois(a,m,p.c,"ca");
    pc+=`<td>${(ca===null||!sm)?'·':pct(ca/sm)}</td>`;
    if(p.cv) pc+='<td></td><td></td>';
  });
  pc+='<td></td><td>100,0 %</td></tr>';

  return synthese(a,m)+`<div class="cadre"><table>${entetes()}
    <tbody>${lignes}${tot}${pc}</tbody></table></div>`;
}

function synthese(a,m){
  const ca=caMois(a,m,false), caN1=caMois(a-1,m,false);
  const ev = (caN1 && caN1!==0) ? (ca-caN1)/caN1 : null;
  const pdj=totalMois(a,m,"petit_dejeuner","ca");
  const bar=GROUPES.includes("BAR 1.13")?totalGroupeMois(a,m,"BAR 1.13","ca"):null;
  const bq =totalGroupeMois(a,m,"BANQUETING","ca");
  const loc=totalGroupeMois(a,m,"LOCATION","ca");
  const cls = ev===null?"":(ev>=0?"pos":"neg");
  const sig = ev===null?"":(ev>=0?"▲ ":"▼ ");
  return `<div class="cartes">
    <div class="carte"><div class="lib">CA hors location</div>
      <div class="val">${eur(ca)}</div>
      <div class="sub">${caN1===null?"pas de N-1":
        `N-1 ${eur(caN1)} · <b class="${cls}">${sig}${pct(ev)}</b>`}</div></div>
    <div class="carte"><div class="lib">Petit déjeuner</div>
      <div class="val">${eur(pdj)}</div>
      <div class="sub">${(pdj&&ca)?pct(pdj/ca)+" du CA":"—"}</div></div>
    <div class="carte"><div class="lib">Bar 1.13</div>
      <div class="val">${eur(bar)}</div>
      <div class="sub">${(bar&&ca)?pct(bar/ca)+" du CA":"—"}</div></div>
    <div class="carte"><div class="lib">Banqueting</div>
      <div class="val">${eur(bq)}</div>
      <div class="sub">${(bq&&ca)?pct(bq/ca)+" du CA":"—"}</div></div>
    <div class="carte"><div class="lib">Location</div>
      <div class="val">${eur(loc)}</div>
      <div class="sub">salle & matériel</div></div>
  </div>`;
}

/* ---------- Comparatif N / N-1 ---------- */
function vueComparatif(){
  const a=etat.annee, m=etat.mois, a1=a-1;
  if(!moisRempli(a,m) && !moisRempli(a1,m))
    return `<div class="vide-msg"><div class="g">◇</div>
      <div>Ni ${MOIS_N[m-1]} ${a} ni ${MOIS_N[m-1]} ${a1} ne contiennent de données.</div></div>`;

  function bloc(an,libelle,classe){
    let l=`<tr class="${classe}"><td class="jour">${libelle}</td>`;
    POSTES.forEach(p=>{
      const ca=totalMois(an,m,p.c,"ca");
      l+=`<td>${ca===null?'·':eur(ca)}</td>`;
      if(p.cv){
        const cv=totalMois(an,m,p.c,"cvts"), v=pm(ca,cv);
        l+=`<td>${cv===null?'·':ent(cv)}</td><td class="pm">${v===null?'·':eur(v)}</td>`;
      }
    });
    l+=`<td>${eur(caMois(an,m,true))}</td><td>${eur(caMois(an,m,false))}</td></tr>`;
    return l;
  }

  function ecarts(mode){
    let l=`<tr class="ecart"><td class="jour">${mode==="v"?"Écart valeur":"Écart %"}</td>`;
    const cel=(x,y)=>{
      if(x===null||y===null) return '<td class="vide">·</td>';
      if(mode==="v"){
        const d=x-y;
        return `<td class="${d>=0?'ecart-pos':'ecart-neg'}">${d>=0?'+':''}${eur(d)}</td>`;
      }
      if(!y) return '<td class="vide">·</td>';
      const d=(x-y)/Math.abs(y);
      return `<td class="${d>=0?'ecart-pos':'ecart-neg'}">${d>=0?'+':''}${pct(d)}</td>`;
    };
    POSTES.forEach(p=>{
      l+=cel(totalMois(a,m,p.c,"ca"), totalMois(a1,m,p.c,"ca"));
      if(p.cv){
        l+=cel(totalMois(a,m,p.c,"cvts"), totalMois(a1,m,p.c,"cvts"));
        l+=cel(pm(totalMois(a,m,p.c,"ca"),totalMois(a,m,p.c,"cvts")),
               pm(totalMois(a1,m,p.c,"ca"),totalMois(a1,m,p.c,"cvts")));
      }
    });
    l+=cel(caMois(a,m,true),caMois(a1,m,true));
    l+=cel(caMois(a,m,false),caMois(a1,m,false));
    return l+"</tr>";
  }

  const ca=caMois(a,m,false), ca1=caMois(a1,m,false);
  const ev=(ca1&&ca1!==0)?(ca-ca1)/ca1:null;
  const cls=ev===null?"":(ev>=0?"pos":"neg");

  const tete=`<div class="cartes">
    <div class="carte"><div class="lib">${MOIS_N[m-1]} ${a}</div>
      <div class="val">${eur(ca)}</div><div class="sub">CA hors location</div></div>
    <div class="carte"><div class="lib">${MOIS_N[m-1]} ${a1}</div>
      <div class="val">${eur(ca1)}</div><div class="sub">CA hors location</div></div>
    <div class="carte"><div class="lib">Évolution</div>
      <div class="val ${cls==='pos'?'':''}" style="color:${
        ev===null?'inherit':(ev>=0?'var(--vert)':'var(--rouge)')}">
        ${ev===null?'—':(ev>=0?'+':'')+pct(ev)}</div>
      <div class="sub">${(ca!==null&&ca1!==null)?
        ((ca-ca1>=0?'+':'')+eur(ca-ca1)):'—'}</div></div>
  </div>`;

  return tete+`<div class="cadre"><table>${entetes()}<tbody>
    ${bloc(a,MOIS_N[m-1]+" "+a,"total")}
    ${bloc(a1,MOIS_N[m-1]+" "+a1,"n1")}
    ${ecarts("v")}
    ${ecarts("p")}
  </tbody></table></div>`;
}

/* ---------- Cumul annuel ---------- */
function vueAnnee(){
  const a=etat.annee;
  let entete='<thead><tr><th class="jour">Mois</th>';
  GROUPES.forEach(g=>entete+=`<th>${g}</th>`);
  entete+='<th>CA hors loc.</th><th>CA total</th><th>N-1 hors loc.</th><th>Écart</th></tr></thead>';

  let corps="";
  for(let m=1;m<=12;m++){
    if(!moisRempli(a,m) && !moisRempli(a-1,m)) continue;
    let l=`<tr><td class="jour">${MOIS_N[m-1]}</td>`;
    GROUPES.forEach(g=>{
      const v=totalGroupeMois(a,m,g,"ca");
      l+=`<td class="${v===null?'vide':''}">${v===null?'·':eur(v)}</td>`;
    });
    const s=caMois(a,m,false), t=caMois(a,m,true), s1=caMois(a-1,m,false);
    const e=(s1&&s1!==0&&s!==null)?(s-s1)/s1:null;
    l+=`<td><b>${s===null?'·':eur(s)}</b></td><td>${t===null?'·':eur(t)}</td>`;
    l+=`<td>${s1===null?'·':eur(s1)}</td>`;
    l+=`<td class="${e===null?'':(e>=0?'ecart-pos':'ecart-neg')}">${
        e===null?'·':(e>=0?'+':'')+pct(e)}</td></tr>`;
    corps+=l;
  }

  let tot='<tr class="total"><td class="jour">Cumul</td>';
  GROUPES.forEach(g=>{
    let s=null;
    for(let m=1;m<=12;m++){const v=totalGroupeMois(a,m,g,"ca"); if(v!==null)s=(s||0)+v;}
    tot+=`<td>${s===null?'·':eur(s)}</td>`;
  });
  const S=caAnnee(a,false), T=caAnnee(a,true), S1=caAnnee(a-1,false);
  const E=(S1&&S1!==0&&S!==null)?(S-S1)/S1:null;
  tot+=`<td>${eur(S)}</td><td>${eur(T)}</td><td>${eur(S1)}</td>`;
  tot+=`<td>${E===null?'·':(E>=0?'+':'')+pct(E)}</td></tr>`;

  if(!corps) return `<div class="vide-msg"><div class="g">◇</div>
    <div>Aucune donnée pour ${a}.</div></div>`;

  return `<div class="cadre" style="max-height:none">
    <table style="font-size:13px">${entete}<tbody>${corps}${tot}</tbody></table></div>`;
}

function brancherImport(){
  const z=document.getElementById("zone"), f=document.getElementById("fichier");
  if(!z) return;
  z.onclick=()=>f.click();
  f.onchange=e=>{ if(e.target.files[0]) lireFichier(e.target.files[0]); };
  ["dragenter","dragover"].forEach(ev=>z.addEventListener(ev,e=>{
    e.preventDefault(); z.classList.add("survol");}));
  ["dragleave","drop"].forEach(ev=>z.addEventListener(ev,e=>{
    e.preventDefault(); z.classList.remove("survol");}));
  z.addEventListener("drop",e=>{
    const fi=e.dataTransfer.files[0]; if(fi) lireFichier(fi);});
}

async function lireFichier(fichier){
  const res=document.getElementById("resultat");
  res.innerHTML=`<div class="alerte a-info"><div>Lecture de ${fichier.name}…</div></div>`;
  try{
    const buf=await fichier.arrayBuffer();
    /* XLSX.read gere le zip nativement : un .zip contenant un .xlsx
       est lui-meme une archive, on tente d'abord la lecture directe */
    let wb;
    try{
      wb=XLSX.read(buf,{type:"array"});
      if(!wb.SheetNames.length) throw new Error("vide");
    }catch(e1){
      throw new Error("Fichier illisible. Vérifiez qu'il s'agit bien de l'export "
        +"« Prix moyen par couvert » de Bizzon.");
    }
    const ws=wb.Sheets[wb.SheetNames[0]];
    const grille=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
    analyser(grille, fichier.name);
  }catch(err){
    res.innerHTML=`<div class="alerte a-erreur"><div><b>Lecture impossible</b>
      ${err.message}</div></div>`;
  }
}

function analyser(g, nomFichier){
  const res=document.getElementById("resultat");

  /* --- 1. Date du rapport : cellule B1 --- */
  let brut = g[0] ? g[0][1] : null;
  const dj = versDate(brut);
  if(!dj){
    res.innerHTML=`<div class="alerte a-erreur"><div><b>Date introuvable</b>
      La cellule B1 devrait contenir la date du rapport. Valeur lue :
      « ${brut===null?"vide":brut} ». Ce fichier n'est probablement pas
      le bon rapport.</div></div>`;
    return;
  }

  /* --- 2. Refus d'une journee non terminee --- */
  const auj=new Date(); auj.setHours(0,0,0,0);
  if(dj >= auj){
    res.innerHTML=`<div class="alerte a-erreur"><div><b>Journée non terminée</b>
      Le rapport porte sur le ${fmtDate(dj)}. Seule une journée close peut être
      importée : reprenez l'export de la veille.</div></div>`;
    return;
  }

  /* --- 3. Reperage des colonnes --- */
  let ligneEntete=-1;
  for(let i=0;i<Math.min(g.length,10);i++){
    const c=g[i]&&g[i][0];
    if(typeof c==="string" && c.toLowerCase().indexOf("centre de revenus")>=0){
      ligneEntete=i; break;
    }
  }
  if(ligneEntete<0){
    res.innerHTML=`<div class="alerte a-erreur"><div><b>Structure inattendue</b>
      La colonne « Centre de revenus » est introuvable.</div></div>`;
    return;
  }

  /* --- 4. Extraction du bloc JOUR (colonnes B, C) --- */
  const lu={}, inconnus=[], surveilles=[];
  for(let i=ligneEntete+1;i<g.length;i++){
    const l=g[i]; if(!l) continue;
    const lib=(l[0]||"").toString().trim();
    if(!lib) continue;
    const L=lib.toUpperCase();
    if(L==="TOTAL") break;
    const code=BIZZON[L];
    if(!code){
      if(IGNORES.indexOf(L)>=0){
        const ca=nombre(l[1]);
        if(ca) surveilles.push({lib:lib, ca:ca});
      } else inconnus.push(lib);
      continue;
    }
    const ca=nombre(l[1]), cv=nombre(l[2]);
    const p=POSTES.find(x=>x.c===code);
    const e={};
    if(ca!==null) e.ca=Math.round(ca*100)/100;
    if(p.cv && cv!==null && cv!==0) e.cvts=Math.round(cv);
    if(Object.keys(e).length) lu[code]=e;
  }

  if(!Object.keys(lu).length){
    res.innerHTML=`<div class="alerte a-erreur"><div><b>Aucune donnée lue</b>
      Le rapport ne contient aucun poste reconnu.</div></div>`;
    return;
  }

  const cle=dj.toISOString().slice(0,10);
  etat.enAttente={jour:cle, donnees:lu, fichier:nomFichier,
                  existant: !!etat.donnees[cle]};

  /* --- 5. Ecran de relecture --- */
  let av="";
  if(etat.donnees[cle]) av=`<div class="alerte a-attention"><div>
    <b>Cette journée est déjà enregistrée</b>
    Valider remplacera les valeurs actuelles. Les écarts sont signalés en bleu
    dans le tableau ci-dessous.</div></div>`;
  if(surveilles.length) av+=`<div class="alerte a-attention"><div>
    <b>Poste non suivi avec du CA</b>
    ${surveilles.map(s=>`${s.lib} : ${eur2(s.ca)}`).join(" · ")}.
    Ce montant ne sera pas importé — il n'existe pas dans votre tableau.</div></div>`;
  if(inconnus.length) av+=`<div class="alerte a-erreur"><div>
    <b>Postes inconnus ignorés</b> ${inconnus.join(" · ")}</div></div>`;

  let tot=0, totCv=0, lignes="";
  POSTES.forEach(p=>{
    const e=lu[p.c]; if(!e) return;
    const ca=e.ca===undefined?null:e.ca, cv=e.cvts===undefined?null:e.cvts;
    if(ca) tot+=ca; if(cv) totCv+=cv;
    const anc=etat.donnees[cle] && etat.donnees[cle][p.c];
    let marque="";
    if(anc && anc.ca!==undefined && Math.abs((anc.ca||0)-(ca||0))>0.005)
      marque=`<span class="chg">était ${eur2(anc.ca)}</span>`;
    const v=pm(ca,cv);
    lignes+=`<tr><td class="lib">${p.n}${marque}</td>
      <td>${ca===null?'—':eur2(ca)}</td>
      <td>${!p.cv?'<span style="color:#C9C6C0">non suivi</span>':(cv===null?'—':ent(cv))}</td>
      <td class="pm">${v===null?'—':eur2(v)}</td></tr>`;
  });

  res.innerHTML=av+`<div class="relecture">
    <div class="tete"><div class="d">${fmtDate(dj)}</div>
      <div class="m">${nomFichier}</div></div>
    <table><thead><tr>
      <th>Poste</th><th class="n">CA net</th><th class="n">Couverts</th><th class="n">Prix moyen</th>
    </tr></thead><tbody>${lignes}
      <tr class="total"><td class="lib">Total</td><td>${eur2(tot)}</td>
        <td>${ent(totCv)}</td><td>—</td></tr>
    </tbody></table>
    <div class="pied">
      <button class="action btn-vide" onclick="annulerImport()">Annuler</button>
      <button class="action btn-or" onclick="validerImport()">
        ${etat.donnees[cle]?"Remplacer la journée":"Valider et enregistrer"}</button>
    </div></div>`;
}

function versDate(v){
  if(v===null||v===undefined) return null;
  if(v instanceof Date) return v;
  if(typeof v==="number"){            /* serial Excel */
    const d=XLSX.SSF.parse_date_code(v);
    if(!d) return null;
    return new Date(d.y,d.m-1,d.d);
  }
  const s=String(v).trim();
  let m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  return null;
}
function nombre(v){
  if(v===null||v===undefined||v==="") return null;
  if(typeof v==="number") return v;
  const s=String(v).replace(/\u202f|\u00a0|\s|€/g,"").replace(",",".");
  const n=parseFloat(s);
  return isNaN(n)?null:n;
}
function fmtDate(d){
  return d.toLocaleDateString("fr-FR",
    {weekday:"long",day:"2-digit",month:"long",year:"numeric"});
}

function annulerImport(){
  etat.enAttente=null;
  document.getElementById("resultat").innerHTML="";
}

async function validerImport(){
  const p=etat.enAttente; if(!p) return;
  const {error}=await sb.from("suivi_ca").upsert({
    jour:p.jour, donnees:p.donnees, maj_le:new Date().toISOString(),
    maj_par:etat.utilisateur});
  if(error){ toast("Enregistrement refusé : "+error.message,true); return; }
  try{
    await sb.from("suivi_ca_imports").insert({
      jour:p.jour, fichier:p.fichier, importe_par:etat.utilisateur,
      ecrasement:p.existant});
  }catch(e){}
  etat.donnees[p.jour]=p.donnees;
  etat.enAttente=null;
  const d=new Date(p.jour+"T00:00:00");
  etat.annee=d.getFullYear(); etat.mois=d.getMonth()+1;
  toast("Journée du "+fmtDate(d)+" enregistrée");
  construireNav();
  document.querySelectorAll(".vue-btn").forEach(x=>x.classList.remove("actif"));
  document.querySelector('[data-vue="mois"]').classList.add("actif");
  etat.vue="mois";
  document.getElementById("nav").classList.remove("masque");
  rendre();
}

    });
    h1.push("C.A. TOTAL",""); h2.push("A/ LOSA","S/ LOSA"); h3.push("Total","Hors loc.");
    L.push(h1); L.push(h2); L.push(h3);

    for(let j=1;j<=nbJours(a,m);j++){
      const d=new Date(a,m-1,j);
      const l=[`${JOURS_N[d.getDay()]} ${String(j).padStart(2,"0")}/${String(m).padStart(2,"0")}`];
      POSTES.forEach(p=>{
        const ca=jourVal(a,m,j,p.c,"ca"); l.push(ca===null?"":ca);
        if(p.cv){
          const cv=jourVal(a,m,j,p.c,"cvts"); l.push(cv===null?"":cv);
          const v=pm(ca,cv); l.push(v===null?"":Math.round(v*100)/100);
        }
      });
      l.push(caJour(a,m,j,true)??"", caJour(a,m,j,false)??"");
      L.push(l);
    }
    /* totaux */
    const t=["TOTAUX"];
    POSTES.forEach(p=>{
      const ca=totalMois(a,m,p.c,"ca"); t.push(ca===null?"":Math.round(ca*100)/100);
      if(p.cv){
        const cv=totalMois(a,m,p.c,"cvts"); t.push(cv===null?"":cv);
        const v=pm(ca,cv); t.push(v===null?"":Math.round(v*100)/100);
      }
    });
    t.push(caMois(a,m,true)??"", caMois(a,m,false)??"");
    L.push(t);

    /* N-1 et ecarts */
    L.push([]);
    const t1=[`TOTAUX ${MOIS_N[m-1]} ${a-1}`];
    POSTES.forEach(p=>{
      const ca=totalMois(a-1,m,p.c,"ca"); t1.push(ca===null?"":Math.round(ca*100)/100);
      if(p.cv){
        const cv=totalMois(a-1,m,p.c,"cvts"); t1.push(cv===null?"":cv);
        const v=pm(ca,cv); t1.push(v===null?"":Math.round(v*100)/100);
      }
    });
    t1.push(caMois(a-1,m,true)??"", caMois(a-1,m,false)??"");
    L.push(t1);

    const ev=["ÉCART %"];
    POSTES.forEach(p=>{
      const x=totalMois(a,m,p.c,"ca"), y=totalMois(a-1,m,p.c,"ca");
      ev.push((x===null||!y)?"":Math.round((x-y)/y*1000)/1000);
      if(p.cv){ ev.push("",""); }
    });
    const X=caMois(a,m,true),Y=caMois(a-1,m,true);
    const X2=caMois(a,m,false),Y2=caMois(a-1,m,false);
    ev.push((X===null||!Y)?"":Math.round((X-Y)/Y*1000)/1000,
            (X2===null||!Y2)?"":Math.round((X2-Y2)/Y2*1000)/1000);
    L.push(ev);

    const ws=XLSX.utils.aoa_to_sheet(L);
    ws["!cols"]=[{wch:11}].concat(new Array(L[2].length-1).fill({wch:11}));
    XLSX.utils.book_append_sheet(wb,ws,`${MOIS_N[m-1].slice(0,9)} ${a}`);
  }

  /* onglet cumul */
  const C=[[`CUMUL ANNUEL ${a}`],[],
           ["Mois"].concat(GROUPES).concat(["CA hors loc.","CA total",`N-1 hors loc.`,"Écart %"])];
  for(let m=1;m<=12;m++){
    if(!moisRempli(a,m)&&!moisRempli(a-1,m)) continue;
    const l=[MOIS_N[m-1]];
    GROUPES.forEach(g=>{const v=totalGroupeMois(a,m,g,"ca");l.push(v===null?"":Math.round(v*100)/100);});
    const s=caMois(a,m,false),t=caMois(a,m,true),s1=caMois(a-1,m,false);
    l.push(s??"",t??"",s1??"",(s===null||!s1)?"":Math.round((s-s1)/s1*1000)/1000);
    C.push(l);
  }
  const wsc=XLSX.utils.aoa_to_sheet(C);
  wsc["!cols"]=new Array(C[2].length).fill({wch:15});
  XLSX.utils.book_append_sheet(wb,wsc,"Cumul annuel");

  XLSX.writeFile(wb,`Suivi_CA_${a}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast("Export généré");
};

if(document.readyState==='loading')
  document.addEventListener('DOMContentLoaded',init);
else init();
</script>
</body>
</html>
